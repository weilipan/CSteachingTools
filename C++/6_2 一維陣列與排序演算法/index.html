<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Array Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>C++ Array Master</h1>
            <p>Visualize and Master C++ Arrays & Algorithms</p>
        </div>
    </header>

    <main class="container">
        <!-- Section 1: Array Basics & Operations -->
        <section id="array-basics">
            <h2>1. Array Basics & Operations</h2>
            <div class="control-panel">
                <div class="input-group">
                    <label>Array Size:</label>
                    <input type="number" id="array-size-input" min="3" max="20" value="10">
                    <button id="btn-create-array">Create Array</button>
                    <button id="btn-random-array">Randomize Values</button>
                </div>
                <div class="input-group">
                    <label>Index:</label>
                    <input type="number" id="access-index" min="0" max="19" placeholder="0">
                    <label>Value:</label>
                    <input type="number" id="update-value" placeholder="99">
                    <button id="btn-update">Update / Access</button>
                </div>
            </div>

            <div class="visualization-area" id="array-container">
                <!-- Array elements will be generated here -->
            </div>

            <div class="code-display">
                <h3>C++ Code:</h3>
                <pre><code id="code-output">// Initialize an array
int arr[10];</code></pre>
            </div>
        </section>

        <!-- Section 2: Searching -->
        <section id="searching">
            <h2>2. Searching Algorithms</h2>
            <div class="tabs">
                <button class="tab-btn active" data-algo="sequential">Sequential Search</button>
            </div>

            <div class="control-panel">
                <div class="input-group">
                    <label>Target Value:</label>
                    <input type="number" id="search-target" placeholder="Value to find">
                    <button id="btn-start-search">Start Search</button>
                </div>
            </div>

            <div class="visualization-area" id="search-container">
                <!-- Search visualization -->
            </div>

            <div class="status-panel" id="search-status">
                Ready to search...
            </div>
        </section>

        <!-- Section 3: Sorting -->
        <section id="sorting">
            <h2>3. Sorting Algorithms</h2>
            <div class="tabs" id="sorting-tabs">
                <button class="tab-btn active" data-algo="bubble">Bubble Sort</button>
                <button class="tab-btn" data-algo="selection">Selection Sort</button>
                <button class="tab-btn" data-algo="insertion">Insertion Sort</button>
                <button class="tab-btn" data-algo="merge">Merge Sort</button>
                <button class="tab-btn" data-algo="quick">Quick Sort</button>
                <button class="tab-btn" data-algo="radix">Radix Sort</button>
            </div>

            <div class="control-panel">
                <button id="btn-generate-sort-array">Generate New Array</button>
                <button id="btn-start-sort" class="primary-btn">Start Sorting</button>
                <button id="btn-pause-sort" disabled>Pause</button>
                <button id="btn-stop-sort" disabled>Stop</button>
                <div class="slider-group">
                    <label>Speed:</label>
                    <input type="range" id="speed-slider" min="1" max="100" value="50">
                </div>
            </div>

            <div class="visualization-area" id="sort-container">
                <!-- Sorting visualization -->
            </div>

            <div class="explanation-panel" id="sort-explanation">
                Select an algorithm and click Start to begin.
            </div>
        </section>
    </main>

    <footer>
        <p>Generated by Antigravity</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
