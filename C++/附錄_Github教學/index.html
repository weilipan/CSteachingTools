<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 互動式教學視覺化</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">
                <i class="fab fa-github"></i>
                <h1>Git & GitHub <span class="highlight">Visualizer</span></h1>
            </div>
            <div class="header-controls">
                <button id="reset-tutorial" class="btn-secondary" title="Reset Tutorial"><i class="fas fa-redo"></i> 重置教學</button>
            </div>
        </header>

        <main class="visualization-area">
            <!-- 區域: 工作目錄 Working Directory -->
            <div class="zone" id="zone-working">
                <div class="zone-header">
                    <i class="fas fa-laptop-code"></i>
                    <h2>Working Directory</h2>
                    <span class="zone-desc">工作目錄</span>
                </div>
                <div class="file-container" id="container-working">
                    <!-- Files generated by JS -->
                </div>
            </div>

            <!-- 方向箭頭 -->
            <div class="arrow-connector" id="arrow-add">
                <div class="arrow-label">git add</div>
                <i class="fas fa-chevron-right"></i>
            </div>

            <!-- 區域: 暫存區 Staging Area -->
            <div class="zone" id="zone-staging">
                <div class="zone-header">
                    <i class="fas fa-archive"></i>
                    <h2>Staging Area</h2>
                    <span class="zone-desc">暫存區</span>
                </div>
                <div class="file-container" id="container-staging">
                    <!-- Files generated by JS -->
                </div>
            </div>

            <!-- 方向箭頭 -->
            <div class="arrow-connector" id="arrow-commit">
                <div class="arrow-label">git commit</div>
                <i class="fas fa-chevron-right"></i>
            </div>

            <!-- 區域: 本地倉庫 Local Repository -->
            <div class="zone" id="zone-local">
                <div class="zone-header">
                    <i class="fas fa-code-branch"></i>
                    <h2>Local Repo</h2>
                    <span class="zone-desc">本地倉庫</span>
                </div>
                 <div class="commit-history" id="container-local">
                    <!-- Commits generated by JS -->
                </div>
                <div class="branch-indicator" id="local-branch-indicator">
                    <span class="current-branch">main</span>
                </div>
            </div>

            <!-- 方向箭頭 -->
            <div class="arrow-connector" id="arrow-push">
                <div class="arrow-label">git push</div>
                <i class="fas fa-chevron-right"></i>
            </div>

            <!-- 區域: 遠端倉庫 Remote Repository -->
            <div class="zone" id="zone-remote">
                <div class="zone-header">
                    <i class="fas fa-cloud"></i>
                    <h2>Remote Repo</h2>
                    <span class="zone-desc">GitHub</span>
                </div>
                <div class="commit-history" id="container-remote">
                    <!-- Commits generated by JS -->
                </div>
                 <div class="branch-indicator" id="remote-branch-indicator">
                    <span class="current-branch">origin/main</span>
                </div>
            </div>
        </main>

        <section class="control-panel">
            <div class="console-output" id="console-output">
                <div class="console-line system">歡迎使用 GitHub 互動式教學！請依照提示操作。</div>
                <div class="console-line system">請開始第一步：建立一個新檔案。</div>
            </div>
            
            <div class="action-buttons">
                <div class="button-group group-basic">
                    <label>基本操作</label>
                    <button class="btn-action" id="btn-create-file" data-cmd="touch"><i class="fas fa-plus"></i> 新增檔案 (touch)</button>
                    <button class="btn-action" id="btn-add" data-cmd="git add"><i class="fas fa-plus-square"></i> 加入暫存 (git add)</button>
                    <button class="btn-action" id="btn-commit" data-cmd="git commit"><i class="fas fa-save"></i> 提交版本 (git commit)</button>
                    <button class="btn-action" id="btn-push" data-cmd="git push"><i class="fas fa-cloud-upload-alt"></i> 推送 (git push)</button>
                </div>

                <div class="button-group group-branch">
                    <label>分支操作</label>
                    <button class="btn-action" id="btn-branch" data-cmd="git branch"><i class="fas fa-code-branch"></i> 建立分支 (git branch)</button>
                    <button class="btn-action" id="btn-checkout" data-cmd="git checkout"><i class="fas fa-exchange-alt"></i> 切換分支 (git checkout)</button>
                    <button class="btn-action" id="btn-merge" data-cmd="git merge"><i class="fas fa-code-merge"></i> 合併分支 (git merge)</button>
                </div>

                <div class="button-group group-advanced">
                    <label>版本控制</label>
                    <button class="btn-action" id="btn-log" data-cmd="git log"><i class="fas fa-history"></i> 檢視紀錄 (git log)</button>
                    <button class="btn-action" id="btn-reset" data-cmd="git reset"><i class="fas fa-undo"></i> 重置版本 (git reset)</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Modal for User Input (e.g., Commit Message, Branch Name) -->
    <div id="input-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">輸入訊息</h3>
            <input type="text" id="modal-input" placeholder="...">
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">取消</button>
                <button id="modal-confirm" class="btn-primary">確認</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
