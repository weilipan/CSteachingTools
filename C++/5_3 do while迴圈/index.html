<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Do-While 迴圈視覺化教學</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">
                <span class="cpp-icon">C++</span>
                <h1>Do-While 迴圈</h1>
            </div>
            <p class="subtitle">視覺化執行流程：先執行，後判斷。</p>
        </header>

        <main class="visualization-grid">
            <!-- Code Section -->
            <section class="code-card glass-panel">
                <div class="card-header">
                    <h2>程式碼</h2>
                    <span class="badge">main.cpp</span>
                </div>
                <div class="code-editor" id="codeEditor">
                    <div class="line" data-line="1"><span class="keyword">int</span> <span class="variable">count</span> = <span class="number">1</span>;</div>
                    <div class="line" data-line="2"><span class="comment">// 迴圈開始</span></div>
                    <div class="line" data-line="3"><span class="keyword">do</span> {</div>
                    <div class="line" data-line="4" id="line-print">    <span class="function">cout</span> &lt;&lt; <span class="string">"Count: "</span> &lt;&lt; <span class="variable">count</span> &lt;&lt; <span class="function">endl</span>;</div>
                    <div class="line" data-line="5" id="line-inc">    <span class="variable">count</span>++;</div>
                    <div class="line" data-line="6" id="line-condition">} <span class="keyword">while</span> (<span class="variable">count</span> &lt;= <span class="number">3</span>);</div>
                    <div class="line" data-line="7"><span class="function">cout</span> &lt;&lt; <span class="string">"Done!"</span> &lt;&lt; <span class="function">endl</span>;</div>
                </div>
            </section>

            <!-- Visualization Section -->
            <section class="visual-card glass-panel">
                <div class="card-header">
                    <h2>執行流程與記憶體</h2>
                </div>
                
                <div class="memory-display">
                    <div class="variable-box">
                        <span class="label">變數 count</span>
                        <div class="value-container">
                            <span class="value" id="var-count">?</span>
                        </div>
                    </div>
                </div>

                <div class="output-console">
                    <div class="console-header">終端機輸出</div>
                    <div class="console-content" id="console-output">
                        <span class="cursor">_</span>
                    </div>
                </div>

                <div class="flow-diagram">
                    <div class="step-node" id="node-start">Start</div>
                    <div class="arrow">↓</div>
                    <div class="step-node" id="node-body">執行程式區塊 (Body)</div>
                    <div class="arrow">↓</div>
                    <div class="step-node shape-diamond" id="node-condition">條件: count <= 3 ?</div>
                    <div class="arrow-container">
                        <div class="arrow-line true-path">True (回頭)</div>
                        <div class="arrow-line false-path">False (結束)</div>
                    </div>
                    <div class="step-node" id="node-end">End</div>
                </div>
            </section>
        </main>

        <footer class="controls-bar glass-panel">
            <div class="status-msg" id="status-msg">準備執行...</div>
            <div class="button-group">
                <button id="btn-reset" class="btn secondary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    重置
                </button>
                <button id="btn-step" class="btn primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 5l7 7-7 7M5 12h14"/></svg>
                    下一步
                </button>
                <button id="btn-auto" class="btn accent">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    自動執行
                </button>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
